name: Verify release integrity

# After a release is published, re-download its assets and verify the installer against its signed
# manifest with the SAME logic clients run. Fails loudly on a partial/aborted upload, a tampered
# installer, a bad signature, or a version mismatch — the automated replacement for the manual audit.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify (e.g. v0.6.5)"
        required: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync (core + dev)
        run: uv sync

      - name: Download the published release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          mkdir -p _rel
          gh release download "$TAG" -R "${{ github.repository }}" -D _rel \
            -p 'DiannotStudio-Setup.exe' -p 'manifest.json' -p 'manifest.sig'
          # gh exits 0 if SOME patterns matched — assert all three so a single missing/aborted asset
          # (the partial-upload class this gate exists to catch) fails loudly here, not later.
          for f in DiannotStudio-Setup.exe manifest.json manifest.sig; do
            test -f "_rel/$f" || { echo "::error::missing release asset $f"; exit 1; }
          done

      - name: Verify installer matches its signed manifest
        env:
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          uv run python scripts/verify_release.py \
            _rel/DiannotStudio-Setup.exe _rel/manifest.json _rel/manifest.sig "${TAG#v}"
